<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  <style>
    body 
    {   
      font-family: Arial, sans-serif;
      background: #1c1c1c;
      color: #eee;
      padding: 30px;
      margin: 0;
      
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh; 
      box-sizing: border-box;
    }

    .login 
    {
      background: #1a1a1a;          
      border-top: 1px solid #333;   
      
      display: flex;
      flex-direction: column;
      gap: 15px; 
      width: 100%;
      max-width: 320px;
      padding: 30px;
      border-radius: 8px;          
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }

    input 
    {
      padding: 10px;
      font-size: 16px;
      background: #222;
      color: #fff;
      border: none;
      border-radius: 5px;
    }

    button 
    {
      padding: 12px;
      font-size: 16px;
      background: #444;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover
    {
      background: #555;
    }

    .error 
    {
      color: #ff6b6b;
      font-size: 14px;
      text-align: center;
      display: none; 
    }
  </style>
</head>
<body>

  <div class="login">
    <input type="text" id="user" placeholder="Username">
    <input type="password" id="pass" placeholder="Password">
    <button onclick="log()">Login</button>
    <div id="err" class="error">Invalid username or password!</div>
  </div>

  <script>
    function log() 
    {
      const user = document.getElementById('user').value;
      const pass = document.getElementById('pass').value;
      const err = document.getElementById('err');

      if (user === "abcd" && pass === "1234") 
      {
        err.style.display = "none";
        window.location.href = "loopp.html"; 
      } 
      else {err.style.display = "block";}
    }
  </script>

</body>
</html>
